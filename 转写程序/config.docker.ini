# RabbitMQ 消费者配置文件 - Docker 环境
# 用于配置 RabbitMQ 连接和 FunASR 服务地址

[rabbitmq]
# Docker 环境使用服务名
host = rabbitmq
port = 5672
username = admin
password = Shilong@123
virtual_host = /
heartbeat = 600
connection_timeout = 30

[funasr]
# Docker 环境内部访问 API Server
url = http://api-server:8000/funasr/audio/transcriptions
api_timeout = 7200
download_timeout = 7200

[queues]
asr_request = asr-request
asr_completed = asr-completed
asr_exchange = asr-exchange
asr_request_routing_key = asr.request
asr_completed_routing_key = asr.completed

[concurrency]
# Docker 环境可以设置更高的并发
max_concurrent_tasks = 40
min_concurrent_tasks = 10
enable_dynamic_concurrency = true

[resource_limits]
# CPU 使用率阈值（百分比），超过此值暂停消费
cpu_threshold = 85
# 内存使用率阈值（百分比），超过此值暂停消费
memory_threshold = 85
# 资源检查间隔（秒）
check_interval = 10

[health_check]
# 是否启用健康检查
enabled = true
# 健康检查间隔（秒）
interval = 30
# 健康检查失败重试次数
max_retries = 3

[logging]
# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# 日志保存路径
log_dir = ./logs
# 是否输出到控制台
console = true
# 日志文件最大大小（MB）
max_file_size = 100
# 保留的日志文件数量
backup_count = 10
